name: Seed Sanity

# Imports the starter catalogue (sanity/seed.ndjson) into your Sanity dataset.
# Runs on GitHub's servers — no local setup needed.
#
# Before running, add a repository secret:
#   Settings → Secrets and variables → Actions → New repository secret
#     Name:  SANITY_AUTH_TOKEN
#     Value: an Editor token from sanity.io/manage → API → Tokens
#
# Then run it from the Actions tab → "Seed Sanity" → "Run workflow".

on:
  workflow_dispatch:
    inputs:
      dataset:
        description: "Sanity dataset to import into"
        required: true
        default: "production"
      mode:
        description: "Import mode (replace = overwrite existing, missing = only add new)"
        required: true
        default: "replace"
        type: choice
        options:
          - replace
          - missing

jobs:
  seed:
    runs-on: ubuntu-latest
    env:
      SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
      # Project ID is public (it also ships in the site bundle). Override with a
      # repo variable SANITY_PROJECT_ID if you ever change projects.
      NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ vars.SANITY_PROJECT_ID || 'pghe25u6' }}
      NEXT_PUBLIC_SANITY_DATASET: ${{ github.event.inputs.dataset }}
    steps:
      - name: Check token is set
        run: |
          if [ -z "$SANITY_AUTH_TOKEN" ]; then
            echo "::error::Missing SANITY_AUTH_TOKEN secret. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Ensure dataset exists (public, so the site can read it)
        run: |
          npx sanity dataset create "${{ github.event.inputs.dataset }}" --visibility public \
            || echo "Dataset already exists — continuing."

      - name: Import starter content
        run: |
          npx sanity dataset import ./sanity/seed.ndjson "${{ github.event.inputs.dataset }}" \
            --${{ github.event.inputs.mode }}

      - name: Done
        run: echo "✅ Seed import complete. Open your site's /studio to see the content."
